[pytest]
markers =
    live_model: tests that require real API keys (INDEXING_CHAT_API_KEY / INDEXING_EMBEDDING_API_KEY)
norecursedirs =
    .git
    .hg
    .mypy_cache
    .pytest_cache
    .ruff_cache
    .tox
    .venv
    node_modules
    dist
    build
    upstream
    .verify
    源码
    scripts
    services/smoke_tests
pythonpath =
    packages/contracts/src
    packages/documents/src
    packages/persistence/src
    packages/ragflow_runtime/src
    services/admin/src
    services/indexing/src
    services/intake-pipeline/src
    services/intake-pipeline/agent-review-worker/src
    services/intake-pipeline/approval-service/src
    services/intake-pipeline/conversion-worker/src
    services/intake-pipeline/document-service/src
    services/intake-pipeline/indexing-service/src
    services/intake-pipeline/ingestion-worker/src
    services/intake-pipeline/publishing-worker/src
    services/workbench-api/src
    scripts
