server:
  port: 18081

spring:
  application:
    name: access
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/reality_rag}
    username: ${DATABASE_USERNAME:reality}
    password: ${DATABASE_PASSWORD:reality}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  ai:
    mcp:
      server:
        enabled: true
        name: reality-rag-access
        version: 0.1.0
        type: SYNC
        instructions: Enterprise KnowledgeBase access MCP server.
        sse-message-endpoint: /mcp/messages
        stdio: false
        resource-change-notification: false
        tool-change-notification: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

access:
  default-retrieval-profile-id: ret_default
  retrieval:
    base-url: http://127.0.0.1:18082
    connect-timeout: 1s
    read-timeout: 3s
