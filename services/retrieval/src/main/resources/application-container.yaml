# Overrides for retrieval running inside Docker Compose.
# Activate with: SPRING_PROFILES_ACTIVE=smoke,container
server:
  port: 18082

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/rag_flow}
    username: ${DATABASE_USERNAME:rag_flow}
    password: ${DATABASE_PASSWORD:rag_flow}

retrieval:
  backends:
    opensearch-base-url: ${OPENSEARCH_BASE_URL:http://opensearch:9201}
    qdrant-base-url: ${QDRANT_BASE_URL:http://qdrant:6333}
  cache:
    redis-url: ${REDIS_URL:redis://:redis@redis:6379/0}
