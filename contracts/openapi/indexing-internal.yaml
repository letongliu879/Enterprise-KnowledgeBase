openapi: 3.1.0
info:
  title: Reality-RAG Indexing Internal API
  version: 0.1.0
paths:
  /internal/parse-previews:
    post:
      operationId: createParsePreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ParsePreviewRequested.schema.json
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  source_file_id:
                    type: string
                  parser_profile_id:
                    type: string
                  chunk_profile_id:
                    type: string
                  parse_mode:
                    type: string
                  document_family:
                    type: string
                  decision_reason:
                    type: string
                  trace_id:
                    type: string
                required: [request_id, source_file_id, parser_profile_id, chunk_profile_id, parse_mode, document_family, decision_reason, trace_id]
  /internal/index-jobs:
    post:
      operationId: createIndexJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/IndexBuildRequested.schema.json
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  build_job_id:
                    type: string
                  status:
                    type: string
                  accepted_command:
                    type: string
                required: [build_job_id, status, accepted_command]
  /internal/index-jobs/{job_id}:
    get:
      operationId: getIndexJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Build job summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  build_job_id:
                    type: string
                  build_request_id:
                    type: string
                  status:
                    type: string
                  doc_id:
                    type: string
                  index_version_id:
                    type: string
                required: [build_job_id, build_request_id, status, doc_id, index_version_id]
  /internal/parse-snapshots/{parse_snapshot_id}:
    get:
      operationId: getParseSnapshot
      parameters:
        - name: parse_snapshot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Parse snapshot
          content:
            application/json:
              schema:
                $ref: ../schemas/ParseSnapshot.schema.json
  /internal/index-versions/{index_version_id}/activate:
    post:
      operationId: activateIndexVersion
      parameters:
        - name: index_version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Accepted
  /internal/index-versions/{index_version_id}/rollback:
    post:
      operationId: rollbackIndexVersion
      parameters:
        - name: index_version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Accepted
  /internal/index-versions/{index_version_id}:
    get:
      operationId: getIndexVersion
      parameters:
        - name: index_version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Index version
          content:
            application/json:
              schema:
                $ref: ../schemas/IndexVersion.schema.json
  /internal/chunks/{evidence_id}/revisions:
    post:
      operationId: createChunkRevision
      parameters:
        - name: evidence_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ChunkRevisionRequest.schema.json
      responses:
        "200":
          description: Chunk revision created or existing (idempotent)
          content:
            application/json:
              schema:
                $ref: ../schemas/ChunkRevisionView.schema.json
        "404":
          description: Base chunk not found
        "409":
          description: Conflict (tenant/collection mismatch)
  /internal/chunk-revisions/{revision_id}:
    get:
      operationId: getChunkRevision
      parameters:
        - name: revision_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chunk revision detail
          content:
            application/json:
              schema:
                $ref: ../schemas/ChunkRevisionView.schema.json
        "404":
          description: Revision not found
  /internal/chunk-revisions/{revision_id}/materialize:
    post:
      operationId: materializeChunkRevision
      parameters:
        - name: revision_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ChunkRevisionMaterializeRequest.schema.json
      responses:
        "200":
          description: Materialization result
          content:
            application/json:
              schema:
                type: object
                properties:
                  revision_id:
                    type: string
                  status:
                    type: string
                  opensearch_record_count:
                    type: integer
                  qdrant_point_count:
                    type: integer
                  superseded_evidence_id:
                    type: string
                required: [revision_id, status]
        "404":
          description: Revision not found
        "500":
          description: Materialization failed (revision status set to failed)
  /internal/parser-profiles/validate:
    post:
      operationId: validateParserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ParserProfileValidateRequest.schema.json
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: ../schemas/ParserProfileValidateResponse.schema.json
        "400":
          description: Invalid request body
        "500":
          description: Internal validation error
  /health:
    get:
      operationId: indexingHealth
      responses:
        "200":
          description: Service health
