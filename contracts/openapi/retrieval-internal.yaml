openapi: 3.1.0
info:
  title: Reality-RAG Retrieval Internal API
  version: 0.1.0
paths:
  /internal/retrieve:
    post:
      operationId: internalRetrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/RetrieveRequest.schema.json
      responses:
        "200":
          description: Knowledge context
          content:
            application/json:
              schema:
                $ref: ../schemas/KnowledgeContext.schema.json
  /internal/retrieval-profiles/{profile_id}:
    get:
      operationId: getRetrievalProfile
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Retrieval profile
          content:
            application/json:
              schema:
                $ref: ../schemas/RetrievalProfile.schema.json
  /internal/retrieval-profiles/validate:
    post:
      operationId: validateRetrievalProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/RetrievalProfileValidateRequest.schema.json
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: ../schemas/RetrievalProfileValidateResponse.schema.json
        "400":
          description: Invalid request body
        "500":
          description: Internal validation error
  /internal/index-projections/sync:
    post:
      operationId: syncIndexProjection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/IndexProjectionSync.schema.json
      responses:
        "200":
          description: Projection synced successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  synced_at:
                    type: string
                    format: date-time
                  chunks_synced:
                    type: integer
                    minimum: 0
                  chunks_removed:
                    type: integer
                    minimum: 0
                required: [synced_at, chunks_synced, chunks_removed]
        "400":
          description: Invalid command envelope or payload
        "409":
          description: Idempotency conflict or stale projection version
  /internal/cache/purge:
    post:
      operationId: purgeCache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/RetrievalCachePurgeRequest.schema.json
      responses:
        "200":
          description: Cache purge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  purged_count:
                    type: integer
                  scope:
                    type: object
                    properties:
                      tenant_id:
                        type: string
                      collection_id:
                        type: string
                      doc_id:
                        type: string
                      evidence_id:
                        type: string
                required: [purged_count]
  /health:
    get:
      operationId: retrievalHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  status:
                    type: string
                required: [service, status]
