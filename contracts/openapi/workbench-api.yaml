          nullable: true
        published_doc_id:
          type: string
          nullable: true
        upload_id:
          type: string
          nullable: true
        filename:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        document_state:
          type: string
          nullable: true
        publish_state:
          type: string
          nullable: true
        active_index_version:
          type: string
          nullable: true
        chunk_count:
