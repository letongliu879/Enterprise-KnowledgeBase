[project]
name = "reality-rag-persistence"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "reality-rag-contracts",
    "enterprise-kb-indexing",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
postgres = [
    "psycopg2-binary>=2.9",
]

[tool.uv.sources]
reality-rag-contracts = { path = "../contracts" }
enterprise-kb-indexing = { path = "../../services/indexing" }