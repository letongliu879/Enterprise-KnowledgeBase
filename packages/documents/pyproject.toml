[project]
name = "reality-rag-documents"
version = "0.1.0"
description = "Shared document domain logic for Reality-RAG"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "Enterprise KnowledgeBase Contributors"},
]
keywords = ["documents", "domain-logic", "knowledge-base"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "reality-rag-contracts",
    "reality-rag-persistence",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.uv.sources]
reality-rag-contracts = { workspace = true }
reality-rag-persistence = { workspace = true }
