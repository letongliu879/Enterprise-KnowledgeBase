[project]
name = "intake-runtime"
version = "0.1.0"
description = "Shared intake runtime logic for Reality-RAG"
requires-python = ">=3.12"
dependencies = [
    "reality-rag-contracts",
    "reality-rag-persistence",
    "reality-rag-documents",
    "httpx",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.uv.sources]
reality-rag-contracts = { workspace = true }
reality-rag-persistence = { workspace = true }
reality-rag-documents = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
