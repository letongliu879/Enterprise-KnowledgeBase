[project]
name = "ragflow-runtime"
version = "0.1.0"
description = "Controlled RAGFlow-derived runtime for Enterprise KnowledgeBase indexing"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "Enterprise KnowledgeBase Contributors"},
]
keywords = ["ragflow", "document-parsing", "chunking"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "beautifulsoup4>=4.13,<5",
    "chardet>=7.0,<8",
    "filelock>=3.18,<4",
    "jinja2>=3.1,<4",
    "json-repair>=0.39,<1",
    "openpyxl>=3.1,<4",
    "pandas>=2.3,<3",
    "Pillow>=11.3,<12",
    "pydantic>=2.0",
    "pypdf>=6.0,<7",
    "python-docx>=1.2,<2",
    "requests>=2.34,<3",
    "olefile>=0.47,<1",
    "python-pptx>=1.0,<2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ragflow_runtime = ["resources/**/*"]
