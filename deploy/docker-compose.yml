# =============================================================================
# Enterprise KnowledgeBase — Deployment Compose
# =============================================================================
# Infrastructure deps: VERIFIED (strict smoke 32/32 against project deploy).
# MinIO/Object Storage: NOT IN MVP PATH (no service uses it).
# Application services: TEMPLATE (Dockerfiles not yet built/tested).
#
# Quick start:
#   1. cp deploy/.env.example deploy/.env   (fill in real secrets)
#   2. docker compose -f deploy/docker-compose.yml up -d
#   3. smoke test:
#      py -3.14 scripts/run_real_runtime_smoke.py --use-existing-services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure (VERIFIED — currently running via upstream docker-compose)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rag_flow
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: rag_flow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-infini_rag_flow}
      plugins.security.disabled: "true"
      plugins.security.ssl.http.enabled: "false"
      plugins.security.ssl.transport.enabled: "false"
      http.port: "9201"
    ports:
      - "1201:9201"
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9201/_cluster/health | grep -q green"]
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 10s
      retries: 30

  redis:
    image: valkey/valkey:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 30

