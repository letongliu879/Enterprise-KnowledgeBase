# =============================================================================
# Enterprise KnowledgeBase — Deployment Compose
# =============================================================================
# Infrastructure deps: VERIFIED (strict smoke 28/28 against project deploy).
# Application services: ENABLED — build images on first `docker compose up`.
#
# Quick start:
#   1. cp deploy/.env.example deploy/.env   (fill in real secrets)
#   2. docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d
#   3. smoke test:
#      uv run python scripts/run_real_runtime_smoke.py --use-existing-services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure (VERIFIED)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rag_flow
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: rag_flow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-infini_rag_flow}
      plugins.security.disabled: "true"
      plugins.security.ssl.http.enabled: "false"
      plugins.security.ssl.transport.enabled: "false"
      http.port: "9201"
    ports:
      - "19201:9201"
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9201/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant image does not include curl/wget; rely on service_started dependency.
    # If you need a readiness probe, add a small sidecar or use an external health checker.

  redis:
    image: valkey/valkey:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # MinIO / S3-compatible Object Storage
  # ---------------------------------------------------------------------------
  # Set MINIO_ROOT_USER / MINIO_ROOT_PASSWORD in deploy/.env.
  # Default credentials: minioadmin / minioadmin (change for production).

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 30

  # ---------------------------------------------------------------------------
  # Database Migrations
  # ---------------------------------------------------------------------------

  migrate:
    image: ekb-python:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command:
      - uv
      - run
      - --no-dev
      - alembic
      - -c
      - packages/persistence/migrations/alembic.ini
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18084:18084"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_ISSUER=${ADMIN_JWT_ISSUER}
      - ADMIN_JWT_AUDIENCE=${ADMIN_JWT_AUDIENCE}
      - AUTH_MODE=${AUTH_MODE}
      - INDEXING_BASE_URL=${INDEXING_BASE_URL}
      - RETRIEVAL_BASE_URL=${RETRIEVAL_BASE_URL}
      - ACCESS_BASE_URL=${ACCESS_BASE_URL}
      - PUBLISHING_WORKER_BASE_URL=${PUBLISHING_WORKER_BASE_URL}
      - INTAKE_BASE_URL=${INTAKE_BASE_URL}
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - admin_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18084"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18084/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  workbench:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18083:18083"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - AUTH_MODE=${AUTH_MODE}
      - ADMIN_BASE_URL=${ADMIN_BASE_URL}
      - INDEXING_BASE_URL=${INDEXING_BASE_URL}
      - INTAKE_BASE_URL=${INTAKE_BASE_URL}
      - DOCUMENT_SERVICE_BASE_URL=${DOCUMENT_SERVICE_BASE_URL}
      - PUBLISHING_WORKER_BASE_URL=${PUBLISHING_WORKER_BASE_URL}
      - INGESTION_WORKER_URL=${INGESTION_WORKER_BASE_URL}
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - workbench_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18083"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18083/workbench/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      admin:
        condition: service_healthy
      indexing:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  indexing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18080:18080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INDEXING_BACKEND_MODE=${INDEXING_BACKEND_MODE}
      - INDEXING_OPENSEARCH_URL=${INDEXING_OPENSEARCH_URL}
      - INDEXING_QDRANT_URL=${INDEXING_QDRANT_URL}
      - INDEXING_EMBEDDING_API_KEY=${INDEXING_EMBEDDING_API_KEY}
      - INDEXING_EMBEDDING_BASE_URL=${INDEXING_EMBEDDING_BASE_URL}
      - INDEXING_EMBEDDING_MODEL=${INDEXING_EMBEDDING_MODEL}
      - INDEXING_CHAT_API_KEY=${INDEXING_CHAT_API_KEY}
      - INDEXING_CHAT_BASE_URL=${INDEXING_CHAT_BASE_URL}
      - INDEXING_CHAT_MODEL=${INDEXING_CHAT_MODEL}
      - INDEXING_REQUIRE_LIVE_BACKENDS=${INDEXING_REQUIRE_LIVE_BACKENDS}
      - RETRIEVAL_SERVICE_URL=${RETRIEVAL_SERVICE_URL}
      - DOCUMENT_STAGING_DIR=/data/intake-staging
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - indexing_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
  document-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DOCUMENT_STAGING_DIR=/data/intake-staging
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - document_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8006"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  publishing-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18086:18086"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REALITY_RAG_SIDECAR_DIR=/data/intake
      - DOCUMENT_STAGING_DIR=/data/intake-staging
      - ADMIN_BASE_URL=${ADMIN_BASE_URL}
      - INDEXING_BASE_URL=${INDEXING_BASE_URL}
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - publishing_worker.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18086"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18086/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      admin:
        condition: service_healthy
      indexing:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  approval-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18087:18087"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DOCUMENT_SERVICE_URL=${DOCUMENT_SERVICE_BASE_URL}
      - INDEXING_SERVICE_URL=${INDEXING_BASE_URL}
      - DOCUMENT_STAGING_DIR=/data/intake-staging
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - approval_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18087"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18087/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      document-service:
        condition: service_healthy
      indexing:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  agent-review-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18090:18090"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REALITY_RAG_SIDECAR_DIR=/data/intake
      - DOCUMENT_STAGING_DIR=/data/intake-staging
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - agent_review_worker.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18090/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      document-service:
        condition: service_healthy
      indexing:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  conversion-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18089:18089"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INDEXING_SERVICE_URL=${INDEXING_BASE_URL}
      - DOCUMENT_STAGING_DIR=/data/intake-staging
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - conversion_worker.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18089"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18089/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      indexing:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  ingestion-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    image: ekb-python:latest
    ports:
      - "18088:18088"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DOCUMENT_SERVICE_URL=${DOCUMENT_SERVICE_BASE_URL}
      - APPROVAL_SERVICE_URL=${APPROVAL_SERVICE_BASE_URL}
      - PUBLISHING_WORKER_URL=${PUBLISHING_WORKER_BASE_URL}
      - INDEXING_SERVICE_URL=${INDEXING_BASE_URL}
      - REALITY_RAG_INTAKE_RUNTIME_DIR=${REALITY_RAG_INTAKE_RUNTIME_DIR}
      - DOCUMENT_STAGING_DIR=/data/intake-staging
    volumes:
      - intake_staging:/data/intake-staging
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - ingestion_worker.main:app
      - --host
      - 0.0.0.0
      - --port
      - "18088"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18088/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      document-service:
        condition: service_healthy
      indexing:
        condition: service_healthy
      approval-service:
        condition: service_healthy
      publishing-worker:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  retrieval:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.java
      args:
        SERVICE_DIR: services/retrieval
    image: ekb-retrieval:latest
    ports:
      - "18082:18082"
    environment:
      - DATABASE_URL=${DATABASE_JDBC_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OPENSEARCH_BASE_URL=${OPENSEARCH_BASE_URL}
      - QDRANT_BASE_URL=${QDRANT_BASE_URL}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - RERANKER_API_KEY=${RERANKER_API_KEY}
      - RERANKER_BASE_URL=${RERANKER_BASE_URL}
      - RERANKER_MODEL=${RERANKER_MODEL}
      - REDIS_URL=${REDIS_URL}
      - RETRIEVAL_CACHE_PROVIDER=${RETRIEVAL_CACHE_PROVIDER}
      - REQUIRE_LIVE_BACKENDS=${REQUIRE_LIVE_BACKENDS}
      - REQUIRE_REDIS_CACHE=${REQUIRE_REDIS_CACHE}
      - SPRING_PROFILES_ACTIVE=smoke,container
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18082/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  access:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.java
      args:
        SERVICE_DIR: services/access
    image: ekb-access:latest
    ports:
      - "18081:18081"
    environment:
      - DATABASE_URL=${DATABASE_JDBC_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - SPRING_PROFILES_ACTIVE=smoke,container
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18081/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      retrieval:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}
        NEXT_PUBLIC_WORKBENCH_API_URL: ${NEXT_PUBLIC_WORKBENCH_API_URL}
    image: ekb-web:latest
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_ADMIN_API_URL=${NEXT_PUBLIC_ADMIN_API_URL}
      - NEXT_PUBLIC_WORKBENCH_API_URL=${NEXT_PUBLIC_WORKBENCH_API_URL}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      admin:
        condition: service_healthy
      workbench:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
volumes:
  pg_data:
  os_data:
  qdrant_data:
  redis_data:
  minio_data:
  intake_staging:
