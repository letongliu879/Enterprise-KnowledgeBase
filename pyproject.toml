[project]
name = "enterprise-knowledgebase"
version = "0.1.0"
requires-python = ">=3.12"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
    "jsonschema>=4.0",
]

[tool.uv.workspace]
members = [
    "services/admin",
    "services/indexing",
    "services/intake-pipeline",
    "services/workbench-api",
    "packages/contracts",
    "packages/persistence",
    "packages/documents",
    "packages/ragflow_runtime",
]

[tool.uv]
package = false
